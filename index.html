<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم أبو محمد</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <header class="header">

        <div class="logo">

            <h1>🍽 مطعم أبو محمد</h1>

            <p>Restaurant POS System</p>

        </div>

        <div class="header-info">

            <div id="date">00 / 00 / 0000</div>

            <div id="time">00:00:00</div>

        </div>

    </header>

    <main class="main">

        <section class="menu">

            <div class="search">

                <input
                    type="text"
                    id="search"
                    placeholder="ابحث عن صنف...">

            </div>

            <div class="categories">

                <button class="category active">الكل</button>

                <button class="category">فول</button>

                <button class="category">طعمية</button>

                <button class="category">مشروبات</button>

                <button class="category">إضافات</button>

            </div>

            <div class="products">

<button class="product" data-name="فول سادة" data-price="10">
    <span>🥣</span>
    <h3>فول سادة</h3>
    <p>10 جنيه</p>
</button>

<button class="product" data-name="فول زيت" data-price="12">
    <span>🫒</span>
    <h3>فول زيت</h3>
    <p>12 جنيه</p>
</button>

<button class="product" data-name="طعمية" data-price="8">
    <span>🧆</span>
    <h3>طعمية</h3>
    <p>8 جنيه</p>
</button>

<button class="product" data-name="طعمية محشية" data-price="10">
    <span>🧆</span>
    <h3>طعمية محشية</h3>
    <p>10 جنيه</p>
</button>

<button class="product" data-name="بطاطس" data-price="15">
    <span>🍟</span>
    <h3>بطاطس</h3>
    <p>15 جنيه</p>
</button>

<button class="product" data-name="باذنجان" data-price="10">
    <span>🍆</span>
    <h3>باذنجان</h3>
    <p>10 جنيه</p>
</button>

<button class="product" data-name="بيض" data-price="20">
    <span>🥚</span>
    <h3>بيض</h3>
    <p>20 جنيه</p>
</button>

<button class="product" data-name="مياه" data-price="5">
    <span>💧</span>
    <h3>مياه</h3>
    <p>5 جنيه</p>
</button>

<div class="summary">

    <div class="field">

        <label>الخصم</label>

        <input
            type="number"
            id="discount"
            value="0"
            min="0">

    </div>

    <div class="field">

        <label>المدفوع</label>

        <input
            type="number"
            id="paid"
            value="0"
            min="0">

    </div>

    <div class="field">

        <label>الباقي</label>

        <input
            type="text"
            id="change"
            value="0.00"
            readonly>

    </div>

</div>

<div class="actions">

    <button id="newOrder">
        طلب جديد
    </button>

    <button id="deleteItem">
        حذف الصنف
    </button>

    <button id="clearBill">
        مسح الفاتورة
    </button>

    <button id="printBill">
        طباعة الفاتورة
    </button>

</div>

</aside>

</main>

<footer class="footer">

    <p>
        © 2026 مطعم أبو محمد - جميع الحقوق محفوظة
    </p>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
